  <path d="M74 1424C258 1318 474 1361 587 1424C700 1487 839 1571 1005 1500V1920H74V1424Z" fill="#020F2A" fill-opacity="0.55"/>

  <rect x="90" y="96" width="248" height="58" rx="29" fill="#F7A63A"/>
  <text x="214" y="132" text-anchor="middle" fill="#08214D" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">STORY PARA REEL</text>

  <text x="90" y="254" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="88" font-weight="800">
    <tspan x="90" dy="0">Tu negocio</tspan>
    <tspan x="90" dy="96">vende por</tspan>
    <tspan x="90" dy="96">WhatsApp?</tspan>
  </text>

  <text x="90" y="612" fill="#D4E6FF" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="500">
