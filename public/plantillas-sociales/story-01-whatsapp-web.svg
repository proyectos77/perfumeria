    <text x="516" y="1442" fill="#0E2758" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">Negocio:</text>
    <text x="516" y="1478" fill="#486381" font-family="Arial, Helvetica, sans-serif" font-size="26">Perfecto, aqui esta toda</text>
