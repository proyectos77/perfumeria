      <stop stop-color="#041D53"/>
      <stop offset="0.55" stop-color="#082B72"/>
      <stop offset="1" stop-color="#041434"/>
    </linearGradient>
    <linearGradient id="flow" x1="311" y1="873" x2="776" y2="1456" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F57C00"/>
      <stop offset="1" stop-color="#26C6DA"/>
    </linearGradient>
    <filter id="drop" x="0" y="0" width="1080" height="1920" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="40" flood-color="#000C24" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1080" height="1920" fill="url(#storybg)"/>
  <circle cx="862" cy="226" r="210" fill="#F57C00" fill-opacity="0.12"/>
