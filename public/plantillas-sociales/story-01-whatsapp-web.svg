    <tspan x="90" dy="50">respalde y lleve a tu cliente al contacto.</tspan>
  </text>

  <g filter="url(#drop)">
    <rect x="296" y="784" width="488" height="832" rx="64" fill="#F4F8FF"/>
    <rect x="486" y="826" width="108" height="14" rx="7" fill="#D3DFF2"/>
    <rect x="338" y="890" width="404" height="248" rx="34" fill="url(#flow)"/>
    <text x="540" y="980" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">Tu web puede</text>
    <text x="540" y="1026" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">mostrar servicios,</text>
    <text x="540" y="1072" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">pruebas y contacto</text>

    <rect x="338" y="1182" width="192" height="56" rx="28" fill="#001F4D"/>
    <text x="434" y="1218" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Solicitar asesoria</text>

    <rect x="338" y="1288" width="258" height="78" rx="26" fill="#E9F1FF"/>
    <text x="368" y="1335" fill="#0E2758" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700">Cliente:</text>
    <text x="480" y="1335" fill="#486381" font-family="Arial, Helvetica, sans-serif" font-size="26">Hola, quiero cotizar</text>

